name: moinsen_runapp
description: >-
  Universal LLM debug bridge for Flutter.
  Three-layer error catching, deduplication, screenshot capture, navigation
  tracking, and a CLI tool for live LLM-assisted debugging.
version: 0.6.3
repository: https://github.com/moinsen-dev/moinsen_runapp
homepage: https://github.com/moinsen-dev/moinsen_runapp
issue_tracker: https://github.com/moinsen-dev/moinsen_runapp/issues

topics:
  - error-handling
  - crash-reporting
  - runapp
  - error-screen
  - flutter

executables:
  moinsen_run: moinsen_run
  moinsen_mcp: moinsen_mcp

environment:
  sdk: ^3.10.8
  flutter: ">=3.29.0"

dependencies:
  args: ^2.7.0
  flutter:
    sdk: flutter
  logging: ^1.3.0
  mcp_dart: ^2.1.0
  path_provider: ^2.1.5
  vm_service: ^15.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
