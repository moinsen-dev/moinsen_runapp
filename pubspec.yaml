name: moinsen_runapp
description: >-
  Drop-in runApp() replacement with three-layer error catching,
  deduplication, and beautiful error screens.
version: 0.2.0

repository: https://github.com/moinsen-dev/moinsen_runapp
homepage: https://github.com/moinsen-dev/moinsen_runapp
issue_tracker: https://github.com/moinsen-dev/moinsen_runapp/issues

topics:
  - error-handling
  - crash-reporting
  - runapp
  - error-screen
  - flutter

executables:
  moinsen_run: moinsen_run

environment:
  sdk: ^3.10.8
  flutter: ">=3.29.0"

dependencies:
  args: ^2.6.0
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  vm_service: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.1.0
